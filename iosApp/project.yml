name: iosApp
options:
  bundleIdPrefix: net.ai-kit
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    INFOPLIST_FILE: iosApp/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: net.ai-kit.nail
    DEVELOPMENT_TEAM: VFNXJC97WZ
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: Apple Development
    PROVISIONING_PROFILE_SPECIFIER: ""
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        includes:
          - "*.swift"
          - "*.tflite"
    settings:
      base:
        SWIFT_VERSION: "5.9"
    info:
      path: iosApp/Info.plist
